<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pop1.nl Collectibles</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0a0a0a;
    color:#ffffff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:linear-gradient(180deg,#111111,#0d0d0d);
    border:1px solid #2b2b2b;
    border-radius:24px;
    padding:50px 40px;
    text-align:center;
    box-shadow:
        0 0 40px rgba(255,184,0,0.08),
        0 0 80px rgba(0,0,0,0.6);
}

.logo-img{
    width:280px;
    max-width:100%;
    height:auto;
    display:block;
    margin:0 auto 25px;
    filter:drop-shadow(0 0 20px rgba(255,184,0,0.4));
}

h1{
    font-size:2.4rem;
    margin-bottom:15px;
    color:#ffffff;
}

.subtitle{
    color:#bdbdbd;
    margin-bottom:35px;
    line-height:1.7;
    font-size:1.05rem;
}

.button{
    display:block;
    width:100%;
    text-decoration:none;
    color:white;
    background:#1f1f1f;
    padding:18px;
    margin-bottom:15px;
    border-radius:12px;
    transition:all 0.3s ease;
    border:1px solid #333;
    font-weight:bold;
    font-size:16px;
}

.button:hover{
    background:#2d2d2d;
    transform:translateY(-2px);
}

.whatsapp{
    background:#25D366;
    border:none;
}

.whatsapp:hover{
    background:#20ba5a;
}

.wantlist{
    background:#ffb800;
    color:#000;
    border:none;
}

.wantlist:hover{
    background:#ffc633;
}

.footer{
    margin-top:30px;
    color:#777;
    font-size:14px;
}
</style>

</head>

<body>

<div class="container">

    <img src="EA5B7172-5FDE-4E39-84B8-D3E1F528F454.png"
         alt="Pop1.nl Collectibles Logo"
         class="logo-img">

    <h1>Pop1.nl Collectibles</h1>

    <p class="subtitle">
        Welcome to Pop1.nl Collectibles.<br>
            </p>

    <a class="button whatsapp"
       href="https://wa.me/31617158908"
       target="_blank">
        📞 WhatsApp: +31 6 17158908
    </a>

    <a class="button wantlist"
       href="https://docs.google.com/spreadsheets/d/1SUQpx0raMMK86jrI-5VEiXBMl53Vd9NOrDrJdLKFNNM/edit?usp=drivesdk"
       target="_blank">
        📋 View Pokémon Wantlist
    </a>

    <div class="footer">
        © 2025 Pop1.nl Collectibles
    </div>

</div>

</body>
</html>
